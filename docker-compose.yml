services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: plately/postgres:16-postgis-pgvector
    container_name: plately_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Chỉ chạy khi volume dữ liệu còn trống (lần init đầu tiên).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
